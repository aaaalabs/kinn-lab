<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KINN — Der KI-Treff für Tirol</title>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --mint: #5ED9A6;
  --mint-hover: #4EC995;
  --mint-bg: rgba(94,217,166,0.08);
  --mint-glow: rgba(94,217,166,0.18);
  --dark: #1a2a22;
  --text-h: #2C3E50;
  --text: #3A3A3A;
  --text-s: #6B6B6B;
  --text-m: #999;
  --bg: #f8faf9;
  --card: #fff;
  --border: rgba(0,0,0,0.06);
  --border-s: #e8e8e8;
  --r: 14px;
  --r-sm: 8px;
  --sh: 0 6px 24px rgba(0,0,0,0.06);
  --sh-lg: 0 12px 40px rgba(0,0,0,0.08);
  --talk: #3B82F6;
  --kurs: #8B5CF6;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Work Sans', system-ui, sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }

/* ====== HERO ====== */
.hero {
  min-height: 80vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center; text-align: center;
  padding: 60px 24px 40px; position: relative; overflow: hidden;
}
.hero::before {
  content: ''; position: absolute; inset: 0;
  background:
    radial-gradient(ellipse at 30% 20%, rgba(94,217,166,0.07) 0%, transparent 60%),
    radial-gradient(ellipse at 70% 80%, rgba(94,217,166,0.05) 0%, transparent 60%);
  pointer-events: none;
}
.hero-logo-svg {
  width: clamp(140px, 24vw, 220px); height: auto;
  fill: var(--dark); margin-bottom: 20px; position: relative;
}

/* THE statement — this is what sticks */
.hero-statement {
  font-size: clamp(22px, 4vw, 32px); font-weight: 700;
  color: var(--dark); letter-spacing: 0.02em;
  margin-bottom: 6px; position: relative; line-height: 1.3;
}
.hero-context {
  font-size: clamp(14px, 2.5vw, 17px); font-weight: 400;
  color: var(--text-s); margin-bottom: 32px; position: relative;
}

/* ====== TERMINE — quiet, tappable rows ====== */
.termine {
  max-width: 400px; width: 100%; position: relative;
  margin-bottom: 20px;
  animation: fadeUp 0.5s ease-out 0.1s both;
}
.termine-label {
  font-size: 9px; font-weight: 600; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--text-m);
  margin-bottom: 8px;
}
.termin-row {
  display: flex; align-items: center;
  padding: 10px 16px; margin-bottom: 2px;
  border-radius: 10px;
  text-decoration: none; color: inherit;
  transition: background 0.15s;
  cursor: pointer;
}
.termin-row:hover { background: rgba(94,217,166,0.06); }
.termin-city {
  font-size: 14px; font-weight: 600; color: var(--dark);
  flex: 1;
}
.termin-date {
  font-size: 12px; color: var(--text-s);
  margin-left: 8px; margin-right: 8px;
}
.termin-arrow {
  font-size: 14px; color: var(--mint);
  transition: transform 0.15s;
}
.termin-row:hover .termin-arrow { transform: translateX(3px); }

/* ====== STATS — whisper, don't shout ====== */
.stats {
  display: flex; gap: 20px; justify-content: center;
  padding: 4px 0 0; position: relative;
  animation: fadeUp 0.5s ease-out 0.2s both;
}
.stat { text-align: center; }
.stat-val { font-weight: 700; font-size: 16px; color: var(--text-s); display: block; line-height: 1.2; }
.stat-label { font-size: 9px; color: var(--text-m); text-transform: uppercase; letter-spacing: 0.06em; }

.hero-login {
  font-size: 11px; color: var(--text-m); margin-top: 8px; position: relative;
}
.hero-login a { color: var(--mint); font-weight: 500; text-decoration: none; }
.hero-login a:hover { text-decoration: underline; }

/* ====== SCROLL HINT ====== */
.scroll-hint {
  position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
  font-size: 11px; color: var(--text-m); letter-spacing: 0.1em; text-transform: uppercase;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 0.8; } }

/* ====== SECTIONS ====== */
.wrap { max-width: 760px; margin: 0 auto; padding: 0 20px; }
.section { padding: 48px 0; }
.section-label {
  font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--text-m); margin-bottom: 16px;
}

/* ====== VOTING ====== */
.voting {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--r); padding: 16px 22px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
}
.voting-label { font-size: 11px; font-weight: 700; color: var(--text-m); text-transform: uppercase; letter-spacing: 0.08em; white-space: nowrap; }
.voting-topics { display: flex; gap: 6px; flex-wrap: wrap; flex: 1; }
.voting-pill { font-size: 12px; font-weight: 500; color: var(--text-h); background: var(--mint-bg); padding: 4px 10px; border-radius: 20px; }
.voting-pill-n { font-weight: 700; color: var(--mint); margin-left: 3px; }
.voting-cta {
  font-size: 11px; font-weight: 700; color: var(--mint);
  background: none; border: 1.5px solid var(--mint); border-radius: 20px;
  padding: 4px 14px; cursor: pointer; font-family: inherit;
  transition: all 0.15s; white-space: nowrap;
}
.voting-cta:hover { background: var(--mint); color: #fff; }

/* ====== TESTIMONIAL (below fold) ====== */
.testimonial {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--r); padding: 20px 22px;
  margin-bottom: 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.03);
}
.testimonial-text { font-size: 14px; font-style: italic; color: var(--text-s); line-height: 1.6; margin-bottom: 14px; }
.testimonial-author { display: flex; align-items: center; gap: 12px; }
.testimonial-avatar {
  width: 40px; height: 40px; border-radius: 50%;
  object-fit: cover; flex-shrink: 0;
  background: var(--border); /* placeholder while loading */
}
.testimonial-name { font-size: 13px; font-weight: 600; color: var(--dark); }
.testimonial-role { font-size: 11px; color: var(--text-m); }

/* ====== FORMAT CARDS ====== */
/* Unlocked: full card with cover */
.format-card-unlocked {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--r); overflow: hidden;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  transition: box-shadow 0.2s, transform 0.2s;
  margin-bottom: 12px;
}
.format-card-unlocked:hover { box-shadow: var(--sh); transform: translateY(-2px); }
.format-card-unlocked .format-card-cover { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; border-bottom: 1px solid var(--border); }
.format-card-unlocked .format-card-body { padding: 16px 20px; }
.format-card-type { font-size: 9px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; display: inline-block; padding: 2px 8px; border-radius: 4px; }
.format-card-type.talk { color: var(--talk); background: rgba(59,130,246,0.08); }
.format-card-type.kurs { color: var(--kurs); background: rgba(139,92,246,0.08); }
.format-card-title { font-size: 15px; font-weight: 700; color: var(--text-h); margin: 4px 0 2px; }
.format-card-meta { font-size: 12px; color: var(--text-s); }
.format-card-cta {
  display: inline-block; padding: 7px 18px; margin-top: 10px;
  background: var(--mint); color: #fff; border: none; border-radius: 6px;
  font-family: inherit; font-size: 13px; font-weight: 600;
  text-decoration: none; cursor: pointer; transition: background 0.15s;
}
.format-card-cta:hover { background: var(--mint-hover); }

/* Locked: compact table inside one card */
.format-locked-list {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--r); overflow: hidden;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
}
.format-locked-row {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px; border-bottom: 1px solid var(--border);
  opacity: 0.7;
}
.format-locked-row:last-child { border-bottom: none; }
.format-locked-badge {
  font-size: 9px; font-weight: 700; letter-spacing: 0.08em;
  text-transform: uppercase; padding: 2px 7px; border-radius: 4px;
  flex-shrink: 0; width: 42px; text-align: center;
}
.format-locked-badge.talk { color: var(--talk); background: rgba(59,130,246,0.08); }
.format-locked-badge.kurs { color: var(--kurs); background: rgba(139,92,246,0.08); }
.format-locked-title { font-size: 13px; font-weight: 600; color: var(--text-h); flex: 1; }
.format-locked-meta { font-size: 11px; color: var(--text-m); white-space: nowrap; }

.format-lock-hint {
  padding: 10px 16px; background: #fafafa;
  border-top: 1px solid var(--border);
  font-size: 12px; color: var(--text-s); line-height: 1.5;
  text-align: center;
}
.format-lock-hint a { color: var(--mint); font-weight: 600; text-decoration: none; }
.format-lock-hint a:hover { text-decoration: underline; }

/* ====== PAST EVENTS ====== */
.photos-scroll {
  display: flex; gap: 16px; overflow-x: auto; padding-bottom: 8px;
  scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.photos-scroll::-webkit-scrollbar { display: none; }
.photo-card {
  flex: 0 0 300px; scroll-snap-align: start;
  position: relative; overflow: hidden; border-radius: var(--r);
  box-shadow: var(--sh);
}
.photo-card img {
  width: 100%; aspect-ratio: 4/3; object-fit: cover; display: block;
  transition: transform 0.3s;
}
.photo-card:hover img { transform: scale(1.03); }
.photo-card-overlay {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 16px;
  background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 100%);
}
.photo-card-name { font-size: 14px; font-weight: 700; color: #fff; }
.photo-card-meta { font-size: 11px; color: rgba(255,255,255,0.7); }
.photo-card-stats { font-size: 11px; color: rgba(255,255,255,0.8); margin-top: 2px; }
.photo-card-stats strong { color: var(--mint); }

/* ====== QUOTES ====== */
.quotes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; margin-top: 20px; }
.quote-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--r); padding: 16px 18px;
  border-left: 3px solid var(--mint);
}
.quote-text { font-size: 13px; font-style: italic; color: var(--text-s); line-height: 1.5; }
.quote-author { font-size: 11px; font-weight: 600; color: var(--text-m); margin-top: 8px; }

/* ====== FOOTER ====== */
.footer {
  text-align: center; padding: 48px 24px 32px;
  font-size: 12px; color: var(--text-m);
  border-top: 1px solid var(--border); margin-top: 24px;
}
.footer a { color: var(--text-s); text-decoration: none; margin: 0 8px; }
.footer a:hover { color: var(--mint); }

/* ====== MODAL ====== */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.45); z-index: 100;
  align-items: center; justify-content: center;
}
.modal-overlay.active { display: flex; }
.modal {
  background: #fff; border-radius: 16px; padding: 32px;
  max-width: 400px; width: 90%; position: relative;
  box-shadow: 0 24px 64px rgba(0,0,0,0.18);
  animation: modalIn 0.2s ease-out;
}
.modal h3 { font-size: 18px; font-weight: 700; color: var(--text-h); margin-bottom: 6px; }
.modal p { font-size: 14px; color: var(--text-s); margin-bottom: 20px; line-height: 1.5; }
.modal-input {
  width: 100%; padding: 11px 14px;
  border: 1.5px solid var(--border-s); border-radius: var(--r-sm);
  font-family: inherit; font-size: 14px; color: var(--text-h);
  margin-bottom: 12px; transition: border-color 0.15s;
}
.modal-input:focus { outline: none; border-color: var(--mint); box-shadow: 0 0 0 3px var(--mint-glow); }
.modal-btn {
  width: 100%; padding: 11px; background: var(--mint); color: #fff;
  border: none; border-radius: var(--r-sm);
  font-family: inherit; font-size: 14px; font-weight: 700;
  cursor: pointer; transition: background 0.15s;
}
.modal-btn:hover { background: var(--mint-hover); }
.modal-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.modal-status { font-size: 13px; color: var(--text-s); margin-top: 12px; text-align: center; }
.modal-close { position: absolute; top: 14px; right: 16px; background: none; border: none; font-size: 22px; color: var(--text-m); cursor: pointer; }

/* ====== PARTNER LOGOS ====== */
.partner-row {
  display: flex; gap: 20px; justify-content: center; align-items: center;
  flex-wrap: wrap; opacity: 0.5; transition: opacity 0.3s;
}
.partner-row:hover { opacity: 0.8; }
.partner-row a { display: inline-flex; }
.partner-row img { height: 24px; object-fit: contain; filter: grayscale(1); transition: filter 0.2s; }
.partner-row a:hover img { filter: grayscale(0); }

/* ====== LUMA CHECKOUT MODAL ====== */
.luma-modal {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.5);
  display: flex; align-items: center; justify-content: center;
  animation: fadeIn 0.2s ease-out;
}
.luma-modal-inner {
  background: #fff; border-radius: 16px; overflow: hidden;
  width: 90%; max-width: 480px; height: 85vh; max-height: 700px;
  box-shadow: 0 24px 64px rgba(0,0,0,0.2);
  position: relative;
  animation: modalIn 0.25s ease-out;
}
.luma-modal-header {
  position: absolute; top: 0; right: 0; z-index: 1;
  padding: 8px 12px;
}
.luma-modal-close {
  background: rgba(255,255,255,0.9); border: none; font-size: 20px;
  color: var(--text-s); cursor: pointer; padding: 4px 10px;
  border-radius: 50%; line-height: 1;
  box-shadow: 0 1px 4px rgba(0,0,0,0.1);
}
.luma-modal-iframe {
  flex: 1; border: none; width: 100%;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* ====== ANIMATIONS ====== */
@keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
@keyframes modalIn { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
.reveal { opacity: 0; transform: translateY(20px); transition: opacity 0.5s, transform 0.5s; }
.reveal.visible { opacity: 1; transform: translateY(0); }

/* ====== RESPONSIVE ====== */
@media (max-width: 640px) {
  .hero { min-height: 85vh; padding: 48px 20px 32px; }
  .stats { gap: 20px; }
  .stat-val { font-size: 22px; }
  .format-grid { grid-template-columns: 1fr; }
  .photo-card { flex: 0 0 260px; }
  .quotes-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- ====== HERO (kinn.at simplicity) ====== -->
<section class="hero">
  <svg class="hero-logo-svg" viewBox="0 0 931.35 308.55" xmlns="http://www.w3.org/2000/svg">
    <polygon points="495.04 20.27 569.04 153.27 569.04 20.27 654.04 20.27 654.04 288.27 572.54 288.27 498.04 159.27 498.04 288.27 416.04 288.27 416.04 20.27 495.04 20.27"/>
    <path d="M682.04,20.27l78.89.11,73.11,133.89V20.27h81v268h-80l-72-130v130h-78.5c-.61,0-1.53-.8-2.5,0V20.27Z"/>
    <polygon points="100.04 20.27 100.04 136.27 160.54 20.27 256.04 20.27 182.26 145.61 262.04 288.27 166.54 288.27 100.04 159.27 100.04 288.27 21.04 288.27 21.04 20.27 100.04 20.27"/>
    <path d="M359.04,20.27v265.5c0,.31,1.37,1.42,1,2.5h-82V20.27h81Z"/>
  </svg>
  <div class="hero-statement">Donnerstag. 8 Uhr.</div>
  <div class="hero-context">Der KI-Treff für Tirol.</div>
  <div id="termine-section"></div>
  <div class="stats" id="stats"></div>
  <div class="hero-login" id="hero-login"></div>
</section>

<!-- ====== BELOW THE FOLD ====== -->
<div class="wrap">
  <div id="hero-quote"></div>
  <div id="voting-section"></div>
  <div id="formats-section"></div>
  <div id="past-section"></div>
</div>

<footer class="footer" id="footer">
  <div class="partner-row" id="partners"></div>
  <div id="footer-links" style="margin-top:20px"></div>
  <div style="margin-top:12px;display:flex;gap:16px;justify-content:center">
    <a href="https://www.linkedin.com/company/kinn-tirol/" target="_blank" rel="noopener" title="LinkedIn">LinkedIn</a>
    <a href="https://www.youtube.com/@kinn-tirol" target="_blank" rel="noopener" title="YouTube">YouTube</a>
    <a href="https://www.instagram.com/kinn.tirol" target="_blank" rel="noopener" title="Instagram">Instagram</a>
  </div>
  <div style="margin-top:12px;font-size:11px;color:var(--text-m)">KINN &mdash; Wo Tiroler KI Profil bekommt</div>
</footer>

<!-- ====== LOGIN MODAL ====== -->
<div class="modal-overlay" id="login-modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <h3>Einloggen</h3>
    <p>Gib deine Email ein — wir schicken dir einen Login-Link.</p>
    <form onsubmit="handleLogin(event)">
      <input type="email" class="modal-input" id="login-email" placeholder="deine@email.at" required autocomplete="email">
      <button type="submit" class="modal-btn" id="login-btn">Link senden</button>
    </form>
    <div class="modal-status" id="login-status"></div>
  </div>
</div>

<script src="/events/landing.js"></script>
</body>
</html>
