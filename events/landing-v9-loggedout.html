<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KINN — Der KI-Treff für Tirol</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Work+Sans:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --mint: #5ED9A6;
  --mint-hover: #4EC995;
  --mint-bg: rgba(94,217,166,0.08);
  --mint-glow: rgba(94,217,166,0.18);
  --dark: #1a2a22;
  --text-h: #2C3E50;
  --text: #3A3A3A;
  --text-s: #6B6B6B;
  --text-m: #999;
  --bg: #f8faf9;
  --card: #fff;
  --border: rgba(0,0,0,0.06);
  --border-s: #e8e8e8;
  --r: 10px;
  --r-sm: 6px;
  --talk: #3B82F6;
  --kurs: #8B5CF6;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Work Sans', system-ui, sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }

/* ====== HERO ====== */
.hero {
  min-height: 88vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center; text-align: center;
  padding: 60px 24px 40px; position: relative; overflow: hidden;
}
/* Background group photo — community feeling */
.hero-bg-photo {
  position: absolute; inset: 0; z-index: 0;
  background-size: cover; background-position: center 30%;
  opacity: 0.06;
  filter: grayscale(1);
}
.hero > * { position: relative; z-index: 1; }

.hero-logo-svg {
  width: clamp(120px, 20vw, 180px); height: auto;
  fill: var(--dark); margin-bottom: 16px;
}

/* THE statement */
.hero-statement {
  font-family: 'Montserrat', 'Work Sans', sans-serif;
  font-size: clamp(26px, 5vw, 40px); font-weight: 900;
  color: var(--dark); letter-spacing: -0.01em;
  margin-bottom: 6px; line-height: 1.15;
}
.hero-context {
  font-size: clamp(14px, 2.5vw, 17px); font-weight: 400;
  color: var(--text-s); margin-bottom: 10px;
}
.hero-stat-line {
  font-size: 12px; color: var(--text-m); margin-bottom: 36px;
  letter-spacing: 0.02em;
}
.hero-stat-line strong { font-weight: 700; color: var(--text-s); }

/* ====== TESTIMONIAL (in hero, before termine) ====== */
.hero-testimonial {
  max-width: 400px; width: 100%;
  display: flex; align-items: flex-start; gap: 12px;
  text-align: left; margin-bottom: 36px;
  animation: fadeUp 0.5s ease-out 0.15s both;
}
.hero-testimonial-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  object-fit: cover; flex-shrink: 0;
}
.hero-testimonial-text {
  font-size: 13px; font-style: italic; color: var(--text-s);
  line-height: 1.5;
}
.hero-testimonial-author {
  font-size: 11px; font-weight: 600; color: var(--text-m);
  font-style: normal; margin-top: 4px;
}

/* ====== TERMINE — quiet, tappable rows ====== */
.termine {
  max-width: 360px; width: 100%;
  margin-bottom: 12px;
  animation: fadeUp 0.5s ease-out 0.2s both;
}
.termine-label {
  font-size: 9px; font-weight: 600; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--text-m);
  margin-bottom: 6px;
}
.termin-row {
  display: flex; align-items: center;
  padding: 11px 14px; margin-bottom: 2px;
  border-radius: 10px;
  text-decoration: none; color: inherit;
  transition: background 0.15s;
  cursor: pointer;
}
.termin-row:hover { background: rgba(94,217,166,0.08); }
.termin-city {
  font-size: 14px; font-weight: 600; color: var(--dark);
  flex: 1;
}
.termin-when {
  font-size: 11px; color: var(--text-m);
  margin-left: 10px; margin-right: 10px;
}
.termin-arrow {
  font-size: 13px; color: var(--mint); opacity: 0.6;
  transition: transform 0.15s, opacity 0.15s;
}
.termin-row:hover .termin-arrow { transform: translateX(3px); opacity: 1; }

.hero-login {
  font-size: 11px; color: var(--text-m); margin-top: 6px;
}
.hero-login a { color: var(--mint); font-weight: 500; text-decoration: none; }
.hero-login a:hover { text-decoration: underline; }

/* ====== SCROLL HINT ====== */
.scroll-hint {
  position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
  font-size: 11px; color: var(--text-m); letter-spacing: 0.1em; text-transform: uppercase;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 0.8; } }

/* ====== SECTIONS ====== */
.wrap { max-width: 620px; margin: 0 auto; padding: 0 24px; }
.section { padding: 56px 0; }
.section-label {
  font-size: 9px; font-weight: 600; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--text-m); margin-bottom: 20px;
}

/* ====== VOTING ====== */
.voting {
  display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap;
  padding: 14px 0;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}
.voting-topics { display: flex; gap: 16px; flex-wrap: wrap; flex: 1; }
.voting-topic {
  font-size: 13px; font-weight: 500; color: var(--text-s);
}
.voting-topic-n { font-weight: 700; color: var(--dark); margin-right: 4px; }
.voting-cta {
  font-size: 12px; font-weight: 600; color: var(--mint);
  background: none; border: none; cursor: pointer; font-family: inherit;
  padding: 0; transition: opacity 0.15s;
}
.voting-cta:hover { opacity: 0.7; }


/* ====== FORMAT LIST (typography-only, no images) ====== */
.format-list {
  border-top: 1px solid var(--border);
}
.format-row {
  display: flex; align-items: baseline; gap: 12px;
  padding: 14px 0;
  border-bottom: 1px solid var(--border);
  text-decoration: none; color: inherit;
  transition: opacity 0.15s;
}
.format-row:hover { opacity: 0.7; }
.format-row-type {
  font-size: 9px; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--text-m);
  flex-shrink: 0; width: 36px;
}
.format-row-title {
  font-size: 15px; font-weight: 600; color: var(--dark); flex: 1;
}
.format-row-meta {
  font-size: 12px; color: var(--text-m); white-space: nowrap;
}
.format-row-arrow {
  font-size: 13px; color: var(--mint); opacity: 0;
  transition: opacity 0.15s, transform 0.15s;
}
.format-row:hover .format-row-arrow { opacity: 1; transform: translateX(3px); }

/* Locked rows */
.format-row.locked { opacity: 0.4; }
.format-row.locked:hover { opacity: 0.4; cursor: default; }

.format-lock-hint {
  padding: 14px 0;
  font-size: 12px; color: var(--text-s); line-height: 1.5;
}
.format-lock-hint a { color: var(--mint); font-weight: 600; text-decoration: none; }
.format-lock-hint a:hover { text-decoration: underline; }

/* ====== PAST EVENTS ====== */
.photos-scroll {
  display: flex; gap: 12px; overflow-x: auto; padding-bottom: 4px;
  scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.photos-scroll::-webkit-scrollbar { display: none; }
.photo-card {
  flex: 0 0 240px; scroll-snap-align: start;
  position: relative; overflow: hidden; border-radius: 10px;
}
.photo-card img {
  width: 100%; aspect-ratio: 4/3; object-fit: cover; display: block;
}
.photo-card-overlay {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 12px;
  background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 100%);
}
.photo-card-name { font-size: 13px; font-weight: 600; color: #fff; }
.photo-card-meta { font-size: 10px; color: rgba(255,255,255,0.65); }
.photo-card-stats { font-size: 10px; color: rgba(255,255,255,0.75); margin-top: 2px; }
.photo-card-stats strong { color: var(--mint); }

/* ====== QUOTES LIST ====== */
.quotes-list {
  margin-top: 32px; padding-top: 24px;
  border-top: 1px solid var(--border);
  display: grid; grid-template-columns: 1fr 1fr; gap: 20px 32px;
}
.quote-item {}
.quote-item-text {
  font-size: 13px; font-weight: 400;
  color: var(--text-s); line-height: 1.5;
  font-style: italic;
}
.quote-item-author {
  font-size: 11px; font-weight: 600; color: var(--text-m); margin-top: 6px;
  font-style: normal;
}
@media (max-width: 640px) {
  .quotes-list { grid-template-columns: 1fr; }
}

/* ====== FOOTER ====== */
.footer {
  text-align: center; padding: 0 24px 48px;
  font-size: 12px; color: var(--text-m);
  margin-top: 64px;
  max-width: 620px; margin-left: auto; margin-right: auto;
}
.footer-block {
  padding: 24px 0;
}
.footer-block:first-child { padding-top: 0; }
.footer a { color: var(--text-s); text-decoration: none; }
.footer a:hover { color: var(--mint); }
.footer-nav { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; font-size: 13px; font-weight: 500; }
.footer-legal { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; font-size: 11px; color: var(--text-m); margin-top: 10px; }
.footer-legal a { color: var(--text-m); }
.footer-social { display: flex; gap: 20px; justify-content: center; }
.footer-social a {
  display: inline-flex; align-items: center; justify-content: center;
  width: 32px; height: 32px; border-radius: 50%;
  color: var(--text-m); transition: color 0.15s;
}
.footer-social a:hover { color: var(--mint); }
.footer-social svg { width: 18px; height: 18px; fill: currentColor; }
.footer-tagline { font-size: 11px; color: var(--text-m); margin-top: 14px; letter-spacing: 0.02em; }

/* ====== MODAL ====== */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.45); z-index: 100;
  align-items: center; justify-content: center;
}
.modal-overlay.active { display: flex; }
.modal {
  background: #fff; border-radius: 16px; padding: 32px;
  max-width: 400px; width: 90%; position: relative;
  box-shadow: 0 24px 64px rgba(0,0,0,0.18);
  animation: modalIn 0.2s ease-out;
}
.modal h3 { font-size: 18px; font-weight: 700; color: var(--text-h); margin-bottom: 6px; }
.modal p { font-size: 14px; color: var(--text-s); margin-bottom: 20px; line-height: 1.5; }
.modal-input {
  width: 100%; padding: 11px 14px;
  border: 1.5px solid var(--border-s); border-radius: var(--r-sm);
  font-family: inherit; font-size: 14px; color: var(--text-h);
  margin-bottom: 12px; transition: border-color 0.15s;
}
.modal-input:focus { outline: none; border-color: var(--mint); box-shadow: 0 0 0 3px var(--mint-glow); }
.modal-btn {
  width: 100%; padding: 11px; background: var(--mint); color: #fff;
  border: none; border-radius: var(--r-sm);
  font-family: inherit; font-size: 14px; font-weight: 700;
  cursor: pointer; transition: background 0.15s;
}
.modal-btn:hover { background: var(--mint-hover); }
.modal-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.modal-status { font-size: 13px; color: var(--text-s); margin-top: 12px; text-align: center; }
.modal-close { position: absolute; top: 14px; right: 16px; background: none; border: none; font-size: 22px; color: var(--text-m); cursor: pointer; }

/* ====== PARTNER LOGOS ====== */
.partner-label {
  font-size: 9px; font-weight: 600; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--text-m); margin-bottom: 16px;
}
.partner-row {
  display: flex; gap: 24px; justify-content: center; align-items: center;
  flex-wrap: wrap; opacity: 0.4;
}
.partner-row a { display: inline-flex; }
.partner-row img { height: 22px; object-fit: contain; filter: grayscale(1); transition: filter 0.3s, opacity 0.3s; }
.partner-row a:hover img { filter: grayscale(0); opacity: 1; }

/* ====== DNA LINK ====== */
.dna-link {
  text-align: center; padding: 56px 0 0;
}
.dna-link a {
  font-size: 12px; font-weight: 500; color: var(--text-m);
  text-decoration: none; letter-spacing: 0.04em;
  transition: color 0.15s;
}
.dna-link a:hover { color: var(--mint); }

@keyframes shimmer { 0% { background-position: -200px 0; } 100% { background-position: 200px 0; } }
.skeleton {
  display: inline-block; border-radius: 4px;
  background: linear-gradient(90deg, var(--border) 25%, rgba(0,0,0,0.04) 50%, var(--border) 75%);
  background-size: 400px 100%;
  animation: shimmer 1.5s ease-in-out infinite;
}

/* ====== ANIMATIONS ====== */
@keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
@keyframes modalIn { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
.reveal { opacity: 0; transform: translateY(20px); transition: opacity 0.5s, transform 0.5s; }
.reveal.visible { opacity: 1; transform: translateY(0); }

/* ====== RESPONSIVE ====== */
@media (max-width: 640px) {
  .hero { min-height: 85vh; padding: 48px 20px 32px; }
  .photo-card { flex: 0 0 200px; }
}
</style>
</head>
