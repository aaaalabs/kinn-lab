<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KINN Blitz</title>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --mint: #5ED9A6;
    --mint-hover: #4EC995;
    --heading: #2C3E50;
    --body: #3A3A3A;
    --sub: #6B6B6B;
    --meta: #999;
    --bg: #fafcfb;
    --border: #e8e8e8;
  }
  body {
    font-family: 'Work Sans', system-ui, sans-serif;
    background: var(--bg);
    color: var(--body);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.5rem;
    -webkit-font-smoothing: antialiased;
  }
  .card {
    width: 100%;
    max-width: 420px;
  }
  .brand {
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--mint);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 1.5rem;
  }
  h1 {
    font-size: 1.75rem;
    font-weight: 700;
    color: var(--heading);
    line-height: 1.2;
    margin-bottom: 0.5rem;
  }
  .sub {
    font-size: 0.9375rem;
    color: var(--sub);
    margin-bottom: 2rem;
    line-height: 1.5;
  }
  textarea {
    width: 100%;
    min-height: 100px;
    padding: 1rem;
    font-family: inherit;
    font-size: 1rem;
    color: var(--body);
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: 0.75rem;
    resize: vertical;
    outline: none;
    transition: border-color 0.15s;
    line-height: 1.5;
  }
  textarea:focus { border-color: var(--mint); }
  textarea::placeholder { color: var(--meta); }
  .name-row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-top: 0.75rem;
  }
  .name-row label {
    font-size: 0.8125rem;
    color: var(--sub);
    flex-shrink: 0;
  }
  .name-row input {
    flex: 1;
    padding: 0.625rem 0.75rem;
    font-family: inherit;
    font-size: 0.9375rem;
    color: var(--body);
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: 0.5rem;
    outline: none;
    transition: border-color 0.15s;
  }
  .name-row input:focus { border-color: var(--mint); }
  .name-row input::placeholder { color: var(--meta); }
  .submit-btn {
    display: block;
    width: 100%;
    margin-top: 1.25rem;
    padding: 0.875rem;
    font-family: inherit;
    font-size: 1rem;
    font-weight: 600;
    color: var(--heading);
    background: var(--mint);
    border: none;
    border-radius: 0.75rem;
    cursor: pointer;
    transition: background 0.15s;
  }
  .submit-btn:hover { background: var(--mint-hover); }
  .submit-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }
  .done {
    display: none;
    text-align: center;
  }
  .done h2 {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--heading);
    margin-bottom: 0.5rem;
  }
  .done p {
    font-size: 0.9375rem;
    color: var(--sub);
    line-height: 1.5;
  }
  .done .back {
    display: inline-block;
    margin-top: 1.5rem;
    font-size: 0.8125rem;
    color: var(--mint);
    text-decoration: none;
    font-weight: 500;
  }
  .error-msg {
    display: none;
    margin-top: 0.5rem;
    font-size: 0.8125rem;
    color: #E74C3C;
  }
  .honey { position: absolute; left: -9999px; }
</style>
</head>
<body>

<div class="card" id="form-card">
  <div class="brand">KINN</div>
  <h1>Was nimmst du mit?</h1>
  <p class="sub">Ein Satz. Was bleibt vom heutigen Donnerstag.</p>

  <form id="blitz-form" onsubmit="handleSubmit(event)">
    <textarea id="stimme" placeholder="Ich nehme mit, dass..." required maxlength="500" autofocus></textarea>

    <div class="name-row">
      <label for="vorname">Vorname</label>
      <input type="text" id="vorname" placeholder="optional" maxlength="50">
    </div>

    <!-- Honeypot -->
    <input type="text" name="website" class="honey" tabindex="-1" autocomplete="off">

    <button type="submit" class="submit-btn" id="submit-btn" disabled>Absenden</button>
    <div class="error-msg" id="error-msg"></div>
  </form>
</div>

<div class="done" id="done-card">
  <h2>Danke.</h2>
  <p>Deine Stimme ist angekommen.</p>
  <a href="https://kinn.at" class="back">kinn.at</a>
</div>

<script>
const textarea = document.getElementById('stimme');
const btn = document.getElementById('submit-btn');

textarea.addEventListener('input', () => {
  btn.disabled = !textarea.value.trim();
});

async function handleSubmit(e) {
  e.preventDefault();

  // Honeypot check
  if (document.querySelector('.honey').value) return;

  const text = textarea.value.trim();
  if (!text) return;

  btn.disabled = true;
  btn.textContent = '...';

  try {
    const res = await fetch('/api/blitz', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        text,
        vorname: document.getElementById('vorname').value.trim() || null,
      }),
    });

    if (!res.ok) {
      const data = await res.json().catch(() => ({}));
      throw new Error(data.error || 'Fehler beim Absenden');
    }

    document.getElementById('form-card').style.display = 'none';
    document.getElementById('done-card').style.display = 'block';
  } catch (err) {
    const errEl = document.getElementById('error-msg');
    errEl.textContent = err.message;
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Absenden';
  }
}
</script>

</body>
</html>
